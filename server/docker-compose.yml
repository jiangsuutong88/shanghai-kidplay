version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kidplay
      POSTGRES_USER: kidplay
      POSTGRES_PASSWORD: kidplay123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
